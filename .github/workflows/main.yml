name: Docker CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
 
env:
  # NEXUS_URL: 4.186.30.35:8082   for nexus push 
  ACR_URL: sammyacr.azurecr.io
  # REPO_NAME: docker-hosted-repo    fro nexus


        

jobs:
  scan-super-linter:
    runs-on: ubuntu-latest

    permissions:
      # contents permission to clone the repository
      contents: read
      packages: read
      # issues and pull-requests permissions to write results as pull
      # request comments. Omit them if you don't need summary comments
      issues: write
      pull-requests: write
      # To report GitHub Actions status checks. Omit if you don't need
      # to update commit status
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Super-linter
        uses: super-linter/super-linter@v8.6.0 # x-release-please-version
        env:
          # To report GitHub Actions status checks
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_DOCKERFILE_HADOLINT: true

  scan-trivy:
    name: Trivy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build an image from Dockerfile
        run: docker build -t ${{ env.ACR_URL }}/my-app:${{ github.run_number }} .
        
      - name: Run Trivy vulnerability scanner
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ env.ACR_URL }}/my-app:${{ github.run_number }}'
          format: 'table'
          output: 'trivy-report.txt'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'   

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with:
          # Artifact name
          name: result-artifact
          # A file, directory or wildcard pattern that describes what to upload
          path: trivy-report.txt

    
          
        
