name: Application CI

on:
  workflow_dispatch: 
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - develop
 

jobs:
  build:
    name: Build Application
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Version Spec of the version to use. Examples: 12.x, 10.15.1, >=10.15.0.
          node-version: 16.x # optional

      - name: Cache node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}


      - name: install dependencies
        if: steps.cache.outputs.cache-hit != 'true'  #agar na mile cache to npm run chala dena else chala skip
        run: npm ci


      

      - name: build application
        run: npm run build

      # 🔢 Version generate (unique every build)
      - name: Set version
        run: |
          echo "VERSION=1.0.${{ github.run_number }}-${{ github.sha }}" >> $GITHUB_ENV

      # 📦 Zip build folder (important for upload)
      - name: Zip build
        run: |
          powershell Compress-Archive -Path build\* -DestinationPath build.zip

      # 📤 Upload to Nexus
      - name: Upload to Nexus
        run: |
          curl -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} `
          --upload-file build.zip `
          http://192.168.224.1:8081/repository/my-nexus-repo/frontend-${{ env.VERSION }}.zip

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: build/

         




          
      
