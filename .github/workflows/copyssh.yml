name: Docker CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
 
env:
  NEXUS_URL: https://4.186.30.35:8082
  REPO_NAME: docker-hosted-repo
  
    

jobs:
  build:
    name: Docker Build CI
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Nexus Login
        run: |
          docker login ${{ env.NEXUS_URL }} \
          -u "${{ secrets.NEXUS_USER }}" \
          -p "${{ secrets.NEXUS_PASS }}"

      - name: Build and push Docker images
        uses: docker/build-push-action@v7
        with:
          context: .
          # Path to the Dockerfile
          file: ./Dockerfile 
          push: true
          tags: 4.186.30.35:8082/react-app:${{ github.run_number }} 
         
         

          
          
          
          

    
      

          
        
