  deploy:
    runs-on: ubuntu-latest
    # needs: build
    name: Deploy-Release
    steps: 
      - name: Download a Build Artifact
        uses: actions/download-artifact@v8
        with:
          # Artifact name
          name: React-App-23706417765
          github-token: ${{ GITHUB.TOKEN }}
          # Destination path
          path: ${{ runner.temp }} 
          run-id: 23706417765
  
      - name: Copy files via SSH
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.LINUXHOST }}
          username: ${{ secrets. LINUXUSERNAME }}
          password: ${{ secrets. LINUXPASSWORD }}
          port: ${{ secrets.LINUXPORT }}
          source: ${{ runner.temp }}/*
          target: /tmp/artifacts
          strip_components: 4
        
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINUXHOST }}
          username: ${{ secrets. LINUXUSERNAME }}
          password: ${{ secrets. LINUXPASSWORD }}
          port: ${{ secrets.LINUXPORT }}
          script_stop: true
          script: |
            sudo mkdir -p /var/www/html
            sudo cp -r /tmp/artifacts/* /var/www/html/
            sudo systemctl restart nginx 

    

        
          

      
