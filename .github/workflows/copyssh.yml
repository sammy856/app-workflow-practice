name: Docker CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  NEXUS_URL: 4.186.30.35:8082
  REPO_NAME: docker-hosted-repo
  
    

jobs:
  build:
    name: Docker Build CI
    runs-on: self-hosted

    steps:
      # - name: Checkout
      #   uses: actions/checkout@v4

      # - name: Build Docker Image
      #   run: docker build -t react-app:${{ github.run_number }} .


      - name: Login to Nexus
        run: |
          run: docker login ${{ env.NEXUS_URL }} -u "${{ secrets.NEXUS_USER }}" -p "${{ secrets.NEXUS_PASS }}"

      - name: Tag Docker Image
        run: |
          docker tag react-app:${{ github.run_number }} ${{ env.NEXUS_URL }}/react-app:${{ github.run_number }}

      - name: Push Docker Image
        run: |
          docker push ${{ env.NEXUS_URL }}/react-app:${{ github.run_number }}

          
          

    
      

          
        
